Summary: Offline-first solo meditation retreat planner
Description: |-
    Solo Retreat is a privacy-focused, offline-first application designed to help 
    practitioners plan and execute solo meditation retreats at home.

    Features:
    * Preparation checklist and schedule builder.
    * Integrated meditation timer with Tibetan bowl sounds.
    * Dhamma talk catalog and offline downloader (dhammatalks.org).
    * Precept tracker and meal cutoff reminders.
    * Personal retreat journal with export functionality.

    The app is built with modern Android practices and respects user privacy by 
    keeping all data local to the device.

